name: Build & Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-ubuntu-2404
            platform: linux
            arch: x64
            targets: ""
          - os: blacksmith-4vcpu-ubuntu-2404-arm
            platform: linux
            arch: arm64
            targets: "AppImage"
          - os: blacksmith-4vcpu-windows-2025
            platform: win
            arch: x64
            targets: ""
          - os: blacksmith-6vcpu-macos-latest
            platform: mac
            arch: x64
            targets: ""

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: serika-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          failOnError: false

      - name: Build for ${{ matrix.platform }} (${{ matrix.arch }})
        run: bun run electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: serika-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate version tag
        id: version
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TIMESTAMP="$(date -u +'%Y%m%d%H%M')"
          TAG="v1.0.0-${TIMESTAMP}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Delete existing tag if present
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, deleting..."
            gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" -X DELETE || true
            git push origin --delete "$TAG" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build release notes
        id: notes
        run: |
          COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          BUILT_AT="$(date -u +'%Y-%m-%d %H:%M UTC')"
          {
            echo "body<<EOF"
            echo "## Serika Desktop — Automated Build"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Message:** ${COMMIT_MSG}"
            echo "**Built:** ${BUILT_AT}"
            echo ""
            echo "### Downloads"
            echo "- **Windows (x64):** \`Serika-x.x.x-win-x64.exe\` (NSIS installer)"
            echo "- **macOS (x64):** \`Serika-x.x.x-mac-x64.dmg\` (DMG)"
            echo "- **Linux (x64):** \`Serika-x.x.x-linux-x64.AppImage\` / \`serika-desktop_x.x.x_amd64.deb\` / \`serika-desktop-x.x.x-x86_64.rpm\`"
            echo "- **Linux (ARM64):** \`Serika-x.x.x-linux-arm64.AppImage\` / \`serika-desktop_x.x.x_arm64.deb\` / \`serika-desktop-x.x.x-aarch64.rpm\`"
            echo ""
            echo "Built with Bun + Electron on Blacksmith runners."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          BODY="${{ steps.notes.outputs.body }}"
          MAX_RETRIES=5
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES — creating release $TAG"
            if gh release create "$TAG" \
              --title "Serika Desktop $TAG" \
              --notes "$BODY" \
              --latest \
              artifacts/**/*; then
              echo "Release created successfully."
              exit 0
            fi
            
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              WAIT=$((60 * i))
              echo "Failed (likely rate limited). Waiting ${WAIT}s before retry..."
              sleep "$WAIT"
            fi
          done
          
          echo "All retry attempts exhausted."
          exit 1
